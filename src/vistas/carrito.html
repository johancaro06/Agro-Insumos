<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - AgroInsumos</title>
    <link rel="stylesheet" href="/css/carrito.css"> <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<main class="cart-container">
    <header class="cart-header">
        <h1>🛒 Tu Carrito de Compras</h1>
        <a href="/index.html">Seguir comprando</a>
    </header>

    <div class="cart-content">
        <section class="cart-items">
            <table id="tablaCarrito">
                <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody id="listaProductos">
                </tbody>
            </table>
            <div id="carritoVacio" style="display: none; text-align: center; padding: 50px;">
                <p>Tu carrito está vacío 🥕</p>
            </div>
        </section>

        <section class="cart-summary">
            <h3>Resumen de Compra</h3>
            <div class="summary-item">
                <span>Total:</span>
                <strong id="totalCarrito">$0</strong>
            </div>
            <button id="btnFinalizarCompra" class="btn-checkout">Finalizar Compra</button>
        </section>
    </div>
</main>

<script src="/js/carrito.js"></script>
</body>
</html>
